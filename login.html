<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Client Login</title>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="portal-shell">
  <header class="site-header">
    <div class="site-header__inner">
      <a class="brand" href="index.html">
        <img src="assets/logo-mark.svg" alt="Portal logo" />
        <span class="brand__label">
          <span class="brand__eyebrow">Private portal</span>
          <span class="brand__name">Kramer Creative</span>
        </span>
      </a>
      <nav class="nav">
        <a href="index.html">Home</a>
        <a href="help.html">Help</a>
        <a href="login.html">Login</a>
        <button type="button" class="js-logout">Log out</button>
      </nav>
    </div>
  </header>

  <div id="toast" class="status hidden" style="position:fixed;right:1rem;bottom:1rem;z-index:999;"></div>

  <main class="login-shell">
    <div class="container">
      <div class="center-stack panel">
        <span class="eyebrow">Client login</span>
        <h1 style="font-size:clamp(2.2rem,4vw,3.6rem);max-width:11ch;">Log in with your email.</h1>
        <p class="lead">Use the email you shared for your project. We will send you a secure sign-in link.</p>

        <form id="login-form" class="mt-2">
          <div class="form-row">
            <label class="label" for="email">Email address</label>
            <input class="input" id="email" name="email" type="email" placeholder="you@example.com" required />
          </div>
          <button class="btn" id="login-submit" type="submit">Email me my secure link</button>
        </form>

        <div id="login-success" class="notice hidden" style="margin-top:1rem;">
          <strong>Check your inbox.</strong>
          <p id="login-status">Your sign-in link is on the way.</p>
        </div>
      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Designed to feel calm, clear, and easy to use.</p>
    </div>
  </footer>

  <script src="assets/config.js"></script>
  <script type="module" src="assets/app.js"></script>
</body>
</html>
